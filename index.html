<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="min-h-screen bg-gradient-to-br from-sky-500 via-blue-600 to-indigo-700 p-8">
        <div class="max-w-md mx-auto">
            <form action="" id="form">
                <input required type="text" id="citySearch" placeholder="Enter city name..."
                    class="w-full px-4 py-3 rounded-lg shadow-lg bg-white/95 text-slate-800 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-300 mb-6" />
                <button id="searchBtn" type="submit"
                    class="w-full px-4 py-3 bg-sky-50 text-sky-700 font-semibold rounded-lg shadow-lg hover:bg-sky-100 transition mb-6">
                    Search
                </button>
                <div class="bg-slate-50/95 border border-sky-100 rounded-lg shadow-xl p-6" id="result">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4" id="city">Your City</h2>
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-5xl font-bold text-blue-600" id="temp">certain °C</span>
                        <span class="text-4xl" id="icon">☀️</span>
                    </div>
                    <p class="text-gray-600 text-lg mb-2">Condition: <span class="font-semibold" id="condition">city's
                            condition</span></p>
                    <p class="text-gray-600 text-lg">Humidity: <span class="font-semibold" id="humidity">h%</span></p>
                </div>
            </form>

        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>

</html>
